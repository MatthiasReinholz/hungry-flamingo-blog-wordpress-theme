name: Finalize release

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: finalize-release-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      attestations: write
      id-token: write
    environment: production

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" =~ ^(release|hotfix)/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Unsupported release branch: $HEAD_REF" >&2
          exit 1

      - name: Check out merged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Validate metadata version
        run: |
          set -euo pipefail
          grep -Eq '^Version: ${{ steps.release.outputs.version }}$' style.css
          grep -Eq '^Stable tag: ${{ steps.release.outputs.version }}$' readme.txt

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Run checks
        run: |
          composer test:php
          npm test

      - name: Build and verify release package
        run: |
          npm run dist
          HFB_VERIFY_SKIP_BUILD=1 npm run verify:dist

      - name: Generate release notes
        run: bash scripts/generate-release-notes.sh "${{ steps.release.outputs.version }}" > dist/release-notes.md

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-${{ steps.release.outputs.version }}
          path: dist/hungry-flamingo-blog.zip
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/hungry-flamingo-blog.zip

      - name: Inspect release tag state
        id: tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(git cat-file -t "refs/tags/$VERSION")" != "tag" ]; then
            echo "Tag $VERSION already exists but is not an annotated tag." >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "$VERSION")"
          if [ "$tag_commit" != "$EXPECTED_COMMIT" ]; then
            echo "Tag $VERSION already points to $tag_commit, expected $EXPECTED_COMMIT." >&2
            exit 1
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git -c tag.gpgsign=false tag -a "${{ steps.release.outputs.version }}" -m "Release ${{ steps.release.outputs.version }}"

      - name: Push tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git push origin "${{ steps.release.outputs.version }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/hungry-flamingo-blog.zip --clobber
            gh release edit "$VERSION" --title "$VERSION" --notes-file dist/release-notes.md --prerelease=false --latest
          else
            gh release create "$VERSION" dist/hungry-flamingo-blog.zip \
              --verify-tag \
              --title "$VERSION" \
              --latest \
              --notes-file dist/release-notes.md
          fi

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          gh release view "$VERSION" \
            --json isDraft,isPrerelease,assets \
            --jq '
              if .isDraft then error("release is still a draft") else . end
              | if .isPrerelease then error("stable release was marked prerelease") else . end
              | if ([.assets[] | select(.name == "hungry-flamingo-blog.zip" and .size > 0)] | length) != 1 then error("missing installable ZIP asset") else "verified" end
            '
