name: Finalize release

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: finalize-release-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    timeout-minutes: 55
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    permissions:
      contents: write
      attestations: write
      id-token: write
    environment: production

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" =~ ^(release|hotfix)/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Unsupported release branch: $HEAD_REF" >&2
          exit 1

      - name: Check out merged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify merged pull request commit
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(git rev-parse HEAD)" != "$MERGE_COMMIT" ]; then
            echo "Checked-out commit does not match the merged PR commit." >&2
            exit 1
          fi

          read -r -a parents <<< "$(git show -s --format=%P "$MERGE_COMMIT")"
          if [ "${#parents[@]}" -ge 2 ] && [ "${parents[1]}" != "$HEAD_SHA" ]; then
            echo "Merged PR second parent ${parents[1]} does not match reviewed head $HEAD_SHA." >&2
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: npm

      - name: Validate metadata version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          grep -Eq "^Version: ${RELEASE_VERSION}$" style.css
          grep -Eq "^Stable tag: ${RELEASE_VERSION}$" readme.txt

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Run audits
        run: bash scripts/run-security-audits.sh

      - name: Validate source and package
        run: npm run validate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up WordPress fixture from packaged theme
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/setup-wordpress-visual-fixture.sh

      - name: Run release visual smoke tests
        env:
          HFB_VISUAL_STRICT_WOO: '1'
          WP_BASE_URL: http://127.0.0.1:8888
        run: npm run test:visual

      - name: Run Theme Check
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/run-theme-check.sh

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: bash scripts/generate-release-notes.sh "$RELEASE_VERSION" > dist/release-notes.md

      - name: Install release security tools
        run: |
          bash scripts/install-release-security-tools.sh "$RUNNER_TEMP/hfb-release-tools"
          echo "$RUNNER_TEMP/hfb-release-tools" >> "$GITHUB_PATH"

      - name: Generate release sidecars
        run: |
          bash scripts/generate-sbom.sh dist/package/hungry-flamingo-blog dist/hungry-flamingo-blog.zip.sbom.cdx.json
          bash scripts/sign-release.sh dist/hungry-flamingo-blog.zip dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-${{ steps.release.outputs.version }}
          path: |
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/hungry-flamingo-blog.zip

      - name: Inspect release tag state
        id: tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(git cat-file -t "refs/tags/$VERSION")" != "tag" ]; then
            echo "Tag $VERSION already exists but is not an annotated tag." >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "$VERSION")"
          if [ "$tag_commit" != "$EXPECTED_COMMIT" ]; then
            echo "Tag $VERSION already points to $tag_commit, expected $EXPECTED_COMMIT." >&2
            exit 1
          fi
          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: git -c tag.gpgsign=false tag -a "$VERSION" -m "Release $VERSION"

      - name: Push tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_assets=(
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          )

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${release_assets[@]}" --clobber
            gh release edit "$VERSION" --title "$VERSION" --notes-file dist/release-notes.md --draft=false --prerelease=false --latest
          else
            gh release create "$VERSION" "${release_assets[@]}" \
              --verify-tag \
              --title "$VERSION" \
              --latest \
              --notes-file dist/release-notes.md
          fi

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          bash scripts/verify-github-release-assets.sh "$VERSION" false \
            dist/hungry-flamingo-blog.zip \
            dist/hungry-flamingo-blog.zip.sbom.cdx.json \
            dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report-finalize-release
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
