name: Release repair

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag in x.y.z format
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Rebuild release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    permissions:
      contents: write
      attestations: write
      id-token: write
    environment: production

    steps:
      - name: Validate target version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use x.y.z format." >&2
            exit 1
          fi
          echo "value=$INPUT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify target tag exists
        env:
          REPOSITORY_GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git ls-remote --exit-code --tags "$REPOSITORY_GIT_URL" "refs/tags/$VERSION" >/dev/null

      - name: Check out tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ steps.version.outputs.value }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag is annotated
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if [ "$(git cat-file -t "refs/tags/$VERSION")" != "tag" ]; then
            echo "Tag $VERSION exists but is not an annotated tag." >&2
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Validate metadata version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          grep -Eq "^Version: ${VERSION}$" style.css
          grep -Eq "^Stable tag: ${VERSION}$" readme.txt

      - name: Run audits
        run: bash scripts/run-security-audits.sh

      - name: Validate source and package
        run: npm run validate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up WordPress fixture from packaged theme
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/setup-wordpress-visual-fixture.sh

      - name: Run release visual smoke tests
        env:
          HFB_VISUAL_STRICT_WOO: '1'
          WP_BASE_URL: http://127.0.0.1:8888
        run: npm run test:visual

      - name: Run Theme Check
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/run-theme-check.sh

      - name: Generate release notes
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: bash scripts/generate-release-notes.sh "$VERSION" > dist/release-notes.md

      - name: Install release security tools
        run: |
          bash scripts/install-release-security-tools.sh "$RUNNER_TEMP/hfb-release-tools"
          echo "$RUNNER_TEMP/hfb-release-tools" >> "$GITHUB_PATH"

      - name: Generate release sidecars
        run: |
          bash scripts/generate-sbom.sh dist/package/hungry-flamingo-blog dist/hungry-flamingo-blog.zip.sbom.cdx.json
          bash scripts/sign-release.sh dist/hungry-flamingo-blog.zip dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-${{ steps.version.outputs.value }}
          path: |
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/hungry-flamingo-blog.zip

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          set -euo pipefail
          release_assets=(
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          )

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "${release_assets[@]}" --clobber
            gh release edit "$VERSION" --title "$VERSION" --notes-file dist/release-notes.md --draft=false --prerelease=false --latest
          else
            gh release create "$VERSION" "${release_assets[@]}" \
              --verify-tag \
              --title "$VERSION" \
              --latest \
              --notes-file dist/release-notes.md
          fi

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          bash scripts/verify-github-release-assets.sh "$VERSION" false \
            dist/hungry-flamingo-blog.zip \
            dist/hungry-flamingo-blog.zip.sbom.cdx.json \
            dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report-release-repair
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
