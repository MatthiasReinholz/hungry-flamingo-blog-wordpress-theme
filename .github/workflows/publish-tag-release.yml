name: Publish tag release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

concurrency:
  group: publish-tag-release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub release for version tag
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Validate version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v?([0-9]+\.[0-9]+\.[0-9]+)(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Tag $tag is not a release version tag; skipping."
            echo "supported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${BASH_REMATCH[2]:-}" ]; then
            echo "Stable tag $tag is handled by the release PR/finalize flow; skipping tag-push publication."
            echo "supported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "supported=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "base=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag comes from trusted history
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release/*:refs/remotes/origin/release/*' \
            '+refs/heads/hotfix/*:refs/remotes/origin/hotfix/*'
          tag_commit="$(git rev-list -n 1 "$TAG_NAME")"
          trusted=false
          while IFS= read -r ref; do
            if git merge-base --is-ancestor "$tag_commit" "$ref"; then
              trusted=true
              break
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/main refs/remotes/origin/release refs/remotes/origin/hotfix)
          if [ "$trusted" != "true" ]; then
            echo "Tag $TAG_NAME points to $tag_commit, which is not reachable from main, release/*, or hotfix/*." >&2
            exit 1
          fi

      - name: Set up PHP
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Install dependencies
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Validate theme metadata
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          BASE_VERSION: ${{ steps.version.outputs.base }}
        run: |
          set -euo pipefail
          grep -Eq "^Version: ${BASE_VERSION}$" style.css
          grep -Eq "^Stable tag: ${BASE_VERSION}$" readme.txt

      - name: Run checks
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          composer test:php
          npm test

      - name: Build and verify release package
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          npm run dist
          HFB_VERIFY_SKIP_BUILD=1 npm run verify:dist

      - name: Generate release notes
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          BASE_VERSION: ${{ steps.version.outputs.base }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          bash scripts/generate-release-notes.sh "$BASE_VERSION" > dist/release-notes.md
          if [ "$TAG_NAME" != "$BASE_VERSION" ]; then
            {
              printf '\n## Tag\n\n'
              printf 'This release was published from `%s` and packages theme metadata version `%s`.\n' "$TAG_NAME" "$BASE_VERSION"
            } >> dist/release-notes.md
          fi

      - name: Upload package artifact
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-${{ steps.version.outputs.tag }}
          path: dist/hungry-flamingo-blog.zip
          if-no-files-found: error

      - name: Attest package provenance
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/hungry-flamingo-blog.zip

      - name: Create or repair GitHub release
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail
          edit_flags=(--title "$TAG_NAME" --notes-file dist/release-notes.md)
          create_flags=(--verify-tag --title "$TAG_NAME" --notes-file dist/release-notes.md)
          edit_flags+=(--prerelease --latest=false)
          create_flags+=(--prerelease --latest=false)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/hungry-flamingo-blog.zip --clobber
            gh release edit "$TAG_NAME" "${edit_flags[@]}"
            exit 0
          fi

          if ! gh release create "$TAG_NAME" dist/hungry-flamingo-blog.zip "${create_flags[@]}"; then
            gh release upload "$TAG_NAME" dist/hungry-flamingo-blog.zip --clobber
            gh release edit "$TAG_NAME" "${edit_flags[@]}"
          fi

      - name: Verify GitHub release
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" \
            --json isDraft,isPrerelease,assets \
            --jq '
              if .isDraft then error("release is still a draft") else . end
              | if .isPrerelease != (env.PRERELEASE == "true") then error("unexpected prerelease flag") else . end
              | if ([.assets[] | select(.name == "hungry-flamingo-blog.zip" and .size > 0)] | length) != 1 then error("missing installable ZIP asset") else "verified" end
            '
