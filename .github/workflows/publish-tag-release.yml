name: Publish tag release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

concurrency:
  group: publish-tag-release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub release for version tag
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Validate version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Tag $tag is not a supported release version tag; skipping."
            echo "supported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${BASH_REMATCH[2]:-}" ]; then
            echo "Stable tag $tag is handled by the release PR/finalize flow; skipping tag-push publication."
            echo "supported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "supported=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "base=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"

      - name: Check out tag
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ steps.version.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag is annotated
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if [ "$(git cat-file -t "refs/tags/$TAG_NAME")" != "tag" ]; then
            echo "Tag $TAG_NAME exists but is not an annotated tag." >&2
            exit 1
          fi

      - name: Verify tag comes from trusted history
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/heads/release/*:refs/remotes/origin/release/*' \
            '+refs/heads/hotfix/*:refs/remotes/origin/hotfix/*'
          tag_commit="$(git rev-list -n 1 "$TAG_NAME")"
          trusted=false
          while IFS= read -r ref; do
            if git merge-base --is-ancestor "$tag_commit" "$ref"; then
              trusted=true
              break
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/main refs/remotes/origin/release refs/remotes/origin/hotfix)
          if [ "$trusted" != "true" ]; then
            echo "Tag $TAG_NAME points to $tag_commit, which is not reachable from main, release/*, or hotfix/*." >&2
            exit 1
          fi

      - name: Set up PHP
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Validate theme metadata
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          BASE_VERSION: ${{ steps.version.outputs.base }}
        run: |
          set -euo pipefail
          grep -Eq "^Version: ${BASE_VERSION}$" style.css
          grep -Eq "^Stable tag: ${BASE_VERSION}$" readme.txt

      - name: Run audits
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          composer audit
          npm audit --audit-level=high

      - name: Validate source and package
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: npm run validate

      - name: Install Playwright browser
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Set up WordPress fixture from packaged theme
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/setup-wordpress-visual-fixture.sh

      - name: Run release visual smoke tests
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          HFB_VISUAL_STRICT_WOO: '1'
          WP_BASE_URL: http://127.0.0.1:8888
        run: npm run test:visual

      - name: Run Theme Check
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/run-theme-check.sh

      - name: Generate release notes
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          BASE_VERSION: ${{ steps.version.outputs.base }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          bash scripts/generate-release-notes.sh "$BASE_VERSION" > dist/release-notes.md
          {
            printf '\n## Tag\n\n'
            printf 'This prerelease was published from `%s` and packages theme metadata version `%s`.\n' "$TAG_NAME" "$BASE_VERSION"
          } >> dist/release-notes.md

      - name: Install release security tools
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          bash scripts/install-release-security-tools.sh "$RUNNER_TEMP/hfb-release-tools"
          echo "$RUNNER_TEMP/hfb-release-tools" >> "$GITHUB_PATH"

      - name: Generate release sidecars
        if: ${{ steps.version.outputs.supported == 'true' }}
        run: |
          bash scripts/generate-sbom.sh dist/package/hungry-flamingo-blog dist/hungry-flamingo-blog.zip.sbom.cdx.json
          bash scripts/sign-release.sh dist/hungry-flamingo-blog.zip dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload package artifact
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-${{ steps.version.outputs.tag }}
          path: |
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          if-no-files-found: error

      - name: Attest package provenance
        if: ${{ steps.version.outputs.supported == 'true' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/hungry-flamingo-blog.zip

      - name: Create or repair GitHub release
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          release_assets=(
            dist/hungry-flamingo-blog.zip
            dist/hungry-flamingo-blog.zip.sbom.cdx.json
            dist/hungry-flamingo-blog.zip.sigstore.json
          )
          edit_flags=(--title "$TAG_NAME" --notes-file dist/release-notes.md --draft=false --prerelease --latest=false)
          create_flags=(--verify-tag --title "$TAG_NAME" --notes-file dist/release-notes.md --prerelease --latest=false)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${release_assets[@]}" --clobber
            gh release edit "$TAG_NAME" "${edit_flags[@]}"
            exit 0
          fi

          if ! gh release create "$TAG_NAME" "${release_assets[@]}" "${create_flags[@]}"; then
            gh release upload "$TAG_NAME" "${release_assets[@]}" --clobber
            gh release edit "$TAG_NAME" "${edit_flags[@]}"
          fi

      - name: Verify GitHub release
        if: ${{ steps.version.outputs.supported == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          bash scripts/verify-github-release-assets.sh "$TAG_NAME" true \
            dist/hungry-flamingo-blog.zip \
            dist/hungry-flamingo-blog.zip.sbom.cdx.json \
            dist/hungry-flamingo-blog.zip.sigstore.json

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report-publish-tag-release
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
