name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate theme
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: wordpress
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'
          tools: composer

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci

      - name: Run dependency audits
        run: |
          composer audit
          npm audit --audit-level=high

      - name: Run validation suite
        run: npm run validate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up WordPress fixture from packaged theme
        env:
          HFB_THEME_SOURCE: ${{ github.workspace }}/dist/package/hungry-flamingo-blog
        run: bash scripts/setup-wordpress-visual-fixture.sh

      - name: Run visual and accessibility smoke tests
        env:
          HFB_VISUAL_STRICT_WOO: '1'
          WP_BASE_URL: http://127.0.0.1:8888
        run: npm run test:visual

      - name: Run Theme Check
        run: bash scripts/run-theme-check.sh

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload theme package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hungry-flamingo-blog-package
          path: dist/hungry-flamingo-blog.zip
          if-no-files-found: error
