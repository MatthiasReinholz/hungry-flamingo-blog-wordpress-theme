version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-dev-tooling:
        dependency-type: development
        patterns:
          - '*'

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    groups:
      composer-dev-tooling:
        dependency-type: development
        patterns:
          - '*'
